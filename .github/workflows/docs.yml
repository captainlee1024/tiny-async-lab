name: Documentation

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MDBOOK_LINKCHECK2_VERSION: 0.11.0
  MDBOOK_MERMAID_VERSION: 0.17.0
  MDBOOK_VERSION: 0.5.2
  PUPPETEER_SKIP_DOWNLOAD: "true"

jobs:
  docs:
    name: docs
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache mdBook tools
        id: cache-mdbook-tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-linkcheck2
            ~/.cargo/bin/mdbook-mermaid
          key: mdbook-${{ runner.os }}-${{ runner.arch }}-${{ env.MDBOOK_VERSION }}-${{ env.MDBOOK_LINKCHECK2_VERSION }}-${{ env.MDBOOK_MERMAID_VERSION }}

      - name: Install mdBook tools
        if: steps.cache-mdbook-tools.outputs.cache-hit != 'true'
        run: >-
          cargo install --locked
          "mdbook@${MDBOOK_VERSION}"
          "mdbook-linkcheck2@${MDBOOK_LINKCHECK2_VERSION}"
          "mdbook-mermaid@${MDBOOK_MERMAID_VERSION}"

      - name: Install Markdown tools
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Check Markdown
        run: markdownlint-cli2

      - name: Check spelling
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

      - name: Check local links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --offline --include-fragments=full --no-progress .
          lycheeVersion: v0.24.2

      - name: Build the book
        run: mdbook build docs

      - name: Test Rust examples in the book
        run: mdbook test docs

      - name: Render Mermaid diagrams
        run: scripts/check-mermaid.sh
